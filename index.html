<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Finance Tracker - Login</title>
    <link rel="stylesheet" href="css/style.css"> <!-- Link to the external CSS file -->
</head>
<body>
    <header>
        <h1>Welcome to Personal Finance Tracker</h1>
        <!-- A brief welcoming header -->
    </header>

    <!-- Simple login form or button to access the dashboard -->
    <section class="login-form">
        <input type="text" id="username" placeholder="Enter username">
        <input type="password" id="password" placeholder="Enter password">
        <button onclick="login()">Login</button> <!-- JavaScript function to handle login -->
    </section>

    <script src="js/main.js"></script> <!-- Link to the main JavaScript file -->
</body>
</html>
